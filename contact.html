      margin: 0;
      background-color: #f9f9f9;
    }
    body.light {
      background: #f9f9f9;
      color: #000000;
    }
    body.dark {
      background: #121212;
      color: #f9f9f9;
    }

<body>

  <header class="h-34 items-center flex bg-[#333] text-white text-2xl sm:text-4xl px-12">
    <h1>Contact Page</h1>
  </header>

  <main>
    <div class="flex flex-row-reverse gap-4 items-center">
        <h1 id="theme">Light Mode</h1>
        <button id="btn" onclick="toggleTheme()" class="border-4 border-black text-md p-2 rounded-2xl transition-colors duration-300">
            Toggle Theme
        </button>
    </div>

    <div class="py-10 flex flex-col mx-auto items-center">
        <h1 class="text-white-1000 text-5xl font-bold md:text-6xl lg:text-7xl xl:text-8xl py-2">CONTACT US</h1>
    </div>
    
    <div>                            
        <form class="mt-5 p-8 flex flex-col items-center">
            <h5 class="flex flex-row w-full md:w-1/2 mb-1">Name</h5>
            <input
            id="input"
            class="p-2 w-full md:w-1/2 rounded-sm border-2 mb-5"
            />
            <h5 class="flex flex-row w-full md:w-1/2 mb-1">Email</h5>
            <input
            id="input"
            class="p-2 w-full md:w-1/2 rounded-sm border-2 mb-5"
            />
            <h5 class="flex flex-row w-full md:w-1/2 mb-1">Message</h5>
            <textarea
            id="input"
            class="p-2 w-full md:w-1/2 rounded-sm border-2 mb-5"
            cols="30"
            rows="10"
            ></textarea>
            <button
            id="btn"
            class=" font-medium px-3 py-2 rounded-md cursor-pointer border-2 px-40"
            >
                Submit
            </button>
        </form>
    </div>

    <script>
    document.body.classList.add("light");

    function toggleTheme() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");

        if (document.body.classList.contains("dark")) {
        document.getElementById("theme").textContent = "Dark Mode";
        document.getElementById("btn").classList.remove("border-black");
        document.getElementById("btn").classList.add("border-white");
        document.getElementById("input").classList.add("border-white");
        document.getElementById("input").classList.remove("border-black");
        } else {
        document.getElementById("theme").textContent = "Light Mode";
        document.getElementById("btn").classList.remove("border-white");
        document.getElementById("btn").classList.add("border-black");
        document.getElementById("input").classList.add("border-black");
        document.getElementById("input").classList.remove("border-white");
        }
    }
    </script>

  </main>
